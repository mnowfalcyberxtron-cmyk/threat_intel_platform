services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vdm-backend
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      VDM_SQLITE_PATH: /data/monitor.db
      VDM_VENDORS_CONFIG_PATH: /config/vendors.yaml
    volumes:
      - ./data:/data
      - ./config:/config:ro
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vdm-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: vdm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
