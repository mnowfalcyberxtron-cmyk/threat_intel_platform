<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Threat Intelligence Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090c10;
            --bg-glass: rgba(15, 20, 25, 0.6);
            --border: rgba(48, 54, 61, 0.6);
            --cyan: #00d4ff;
            --blue: #388bfd;
            --purple: #bc8cff;
            --txt: #c9d1d9;
            --muted: #8b949e;
            --red: #f85149;
            --green: #2ea043;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, rgba(56,139,253,0.05) 50%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            filter: blur(60px);
            animation: pulseGlow 8s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 30px;
            -webkit-text-fill-color: initial;
            color: var(--cyan);
            animation: spinPulse 4s infinite linear;
        }

        @keyframes spinPulse {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            color: var(--muted);
            font-weight: 600;
            transition: 0.2s ease;
            font-size: 14px;
            position: relative;
        }

        .tab.active {
            color: var(--cyan);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--cyan);
            box-shadow: 0 -2px 10px var(--cyan);
        }

        .form-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.15);
            background: #0d1117;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(188, 140, 255, 0.3);
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .alert.error {
            background: rgba(248, 81, 73, 0.1);
            color: var(--red);
            border: 1px solid rgba(248, 81, 73, 0.4);
            display: block;
        }

        .alert.success {
            background: rgba(46, 160, 67, 0.1);
            color: var(--green);
            border: 1px solid rgba(46, 160, 67, 0.4);
            display: block;
        }
        
        .requirements {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo">
                <span class="logo-icon">⬡</span> Advanced TIP
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div id="msgBox" class="alert"></div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="form-section active">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Access Platform</button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" class="form-section">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signupEmail" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" required placeholder="••••••••">
                <div class="requirements">Min 8 chars, 1 special char (!@#$...)</div>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
            document.getElementById('msgBox').className = 'alert';
        }

        function showMsg(msg, type='error') {
            const box = document.getElementById('msgBox');
            box.className = `alert ${type}`;
            box.innerText = msg;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = e.target.querySelector('button');
            btn.innerHTML = 'Authenticating...';
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('atip_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    showMsg(data.detail || "Login failed");
                    btn.innerHTML = 'Access Platform';
                }
            } catch (err) {
                showMsg("Network error.");
                btn.innerHTML = 'Access Platform';
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            const btn = e.target.querySelector('button');
            btn.innerHTML = 'Creating Account...';
            
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, password})
                });
                const data = await res.json();
                
                if (res.ok) {
                    showMsg("Account created successfully! Please sign in.", "success");
                    setTimeout(() => switchTab('login'), 2000);
                } else {
                    showMsg(data.detail || "Signup failed");
                }
            } catch (err) {
                showMsg("Network error.");
            }
            btn.innerHTML = 'Create Account';
        });
    </script>
</body>
</html>
