
services:
  app:
    build: .
    container_name: cyberxtron_tip
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      # Override Tor host to use the Docker internal service name
      - TOR_SOCKS_HOST=tor
      - TOR_SOCKS_PORT=9050
      - ENABLE_DARKWEB=true
      - PORT=8002
      - HOST=0.0.0.0
      - AUTO_RUN_ALL_ON_STARTUP=true
    volumes:
      # Persist database, logs, screenshots and reports across restarts
      - ./data:/app/data
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
      - ./reports:/app/reports
    depends_on:
      - tor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    dns_opt:
      - "timeout:10"
      - "attempts:3"
    # Keep container running even if it crashes (will auto-restart)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  tor:
    image: peterdavehello/tor-socks-proxy:latest
    container_name: cyberxtron_tor
    ports:
      - "9050:9050"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9050"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  data:
  logs:
  screenshots:
  reports:
